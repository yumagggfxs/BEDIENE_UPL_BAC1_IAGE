<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription | ReminderPro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* =========================
   REMINDERPRO - STYLE.CSS
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#4f46e5,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    display:flex;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.left{
    width:45%;
    padding:60px 40px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:42px;
    margin-bottom:15px;
}

.left h2{
    font-size:28px;
    margin-bottom:20px;
}

.left p{
    line-height:28px;
    margin-bottom:30px;
}

.left img{
    width:100%;
    max-width:320px;
    margin:auto;
}

.right{
    width:55%;
    background:#fff;
    padding:40px;
}

.right h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:30px;
    font-size:30px;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:18px;
    padding:12px 15px;
    transition:.3s;
}

.input-box:hover{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.input-box i{
    color:#0d6efd;
    margin-right:10px;
    font-size:18px;
}

.input-box input,
.input-box select{
    width:100%;
    border:none;
    outline:none;
    background:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#084298;
    transform:translateY(-3px);
}

.login-link{
    margin-top:20px;
    text-align:center;
    font-size:15px;
}

.login-link a{
    color:#0d6efd;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

@media(max-width:900px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left{
    text-align:center;
}

.left img{
    display:none;
}

}
</style>
</head>

<body>

<div class="container">

<div class="left">

<h1>ReminderPro</h1>

<h2>Bienvenue !</h2>

<p>

Créez votre compte gratuitement afin de gérer vos événements,
recevoir des rappels automatiques et ne plus oublier vos dates importantes.

</p>

<img src="images/reminder.png" alt="Illustration">

</div>

<div class="right">

<form action="tableau_de_bord.html" method="POST">

<h2>Créer un compte</h2>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
name="nom"
placeholder="Nom"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
name="postnom"
placeholder="Postnom"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
name="prenom"
placeholder="Prénom"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-venus-mars"></i>

<select name="sexe" required>

<option value="">Sélectionnez votre sexe</option>

<option>Masculin</option>

<option>Féminin</option>

</select>

</div>

<div class="input-box">

<i class="fa-solid fa-cake-candles"></i>

<input
type="date"
name="naissance"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
name="email"
placeholder="Adresse e-mail"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
name="telephone"
placeholder="Téléphone"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
name="password"
placeholder="Mot de passe"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
name="confirm_password"
placeholder="Confirmer le mot de passe"
required>

</div>

<button type="submit">

<i class="fa-solid fa-user-plus"></i>

S'inscrire

</button>

<div class="login-link">

Vous avez déjà un compte ?

<a href="connexion.html">

Se connecter

</a>

</div>

</form>

</div>

</div>
<script>
  // ===============================
// REMINDERPRO - script.js
// ===============================

const form = document.querySelector("form");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const nom = document.querySelector('input[name="nom"]').value.trim();
    const postnom = document.querySelector('input[name="postnom"]').value.trim();
    const prenom = document.querySelector('input[name="prenom"]').value.trim();
    const email = document.querySelector('input[name="email"]').value.trim();
    const telephone = document.querySelector('input[name="telephone"]').value.trim();
    const password = document.querySelector('input[name="password"]').value;
    const confirmPassword = document.querySelector('input[name="confirm_password"]').value;

    if(
        nom === "" ||
        postnom === "" ||
        prenom === "" ||
        email === "" ||
        telephone === ""
    ){
        alert("Veuillez remplir tous les champs.");
        return;
    }

    if(password.length < 6){
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
    }

    if(password !== confirmPassword){
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    alert("Inscription réussie ! Bienvenue sur ReminderPro.");

    // Redirection vers le tableau de bord
    window.location.href = "tableau_de_bord.html";

});
</script>
</body>

</html>
