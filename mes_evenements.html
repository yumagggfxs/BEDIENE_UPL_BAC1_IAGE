href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ===========================
   MES EVENEMENTS - ReminderPro
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* ===== LAYOUT ===== */

.container{
    display:flex;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:260px;
    height:100vh;
    background:#0d6efd;
    position:fixed;
    left:0;
    top:0;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:12px;
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar ul li a:hover,
.sidebar ul li.active a{
    background:#fff;
    color:#0d6efd;
}

/* ===== CONTENU ===== */

.content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:30px;
}

/* ===== HEADER ===== */

header{
    margin-bottom:30px;
}

header h1{
    color:#0d6efd;
    font-size:32px;
}

header p{
    color:#666;
}

/* ===== CARDS ===== */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* carte événement */
.event-card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:0.3s;
}

.event-card:hover{
    transform:translateY(-5px);
}

.event-card h3{
    color:#0d6efd;
    margin-bottom:10px;
}

.event-card p{
    color:#555;
    margin-bottom:5px;
}

/* boutons */
.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

/* supprimer */
.delete{
    background:#dc3545;
    color:white;
}

.delete:hover{
    background:#b02a37;
}

/* modifier */
.edit{
    background:#0d6efd;
    color:white;
}

.edit:hover{
    background:#084298;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.content{
    margin-left:0;
    width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<h2>ReminderPro</h2>

<header>
<h1>Mes événements 📅</h1>
<p>Retrouvez tous vos événements enregistrés</p>
</header>

<div id="listeEvenements" class="cards"></div>

</div>

</div>

<script src="mes_evenements.js"></script>
<script>
  // ===============================
// MES EVENEMENTS - ReminderPro
// ===============================

// Récupération de la zone d'affichage
const container = document.getElementById("listeEvenements");

// Charger les événements
function chargerEvenements() {

    container.innerHTML = "";

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    if (evenements.length === 0) {
        container.innerHTML = "<p style='color:#666'>Aucun événement enregistré.</p>";
        return;
    }

    evenements.forEach((ev, index) => {

        const card = document.createElement("div");
        card.classList.add("event-card");

        card.innerHTML = `
            <h3>${ev.titre}</h3>
            <p><strong>Catégorie :</strong> ${ev.categorie}</p>
            <p><strong>Date :</strong> ${ev.date}</p>
            <p><strong>Heure :</strong> ${ev.heure}</p>
            <p><strong>Lieu :</strong> ${ev.lieu || "Non défini"}</p>
            <p><strong>Description :</strong> ${ev.description || "Aucune"}</p>

            <div class="actions">
                <button class="edit" onclick="modifierEvent(${index})">Modifier</button>
                <button class="delete" onclick="supprimerEvent(${index})">Supprimer</button>
            </div>
        `;

        container.appendChild(card);
    });
}

// Supprimer un événement
function supprimerEvent(index) {

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    if (confirm("Voulez-vous vraiment supprimer cet événement ?")) {

        evenements.splice(index, 1);

        localStorage.setItem("evenements", JSON.stringify(evenements));

        chargerEvenements();
    }
}

// Modifier (simple version)
function modifierEvent(index) {

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    let ev = evenements[index];

    // Sauvegarde temporaire pour édition
    localStorage.setItem("editEvent", JSON.stringify(ev));
    localStorage.setItem("editIndex", index);

    alert("Vous pouvez maintenant modifier cet événement (fonction à connecter à la page création).");

    window.location.href = "creer_evenement.html";
}

// Charger automatiquement au démarrage
chargerEvenements();
</script>
