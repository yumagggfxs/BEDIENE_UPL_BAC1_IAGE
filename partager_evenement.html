<style>
  /* ===========================
   PARTAGER EVENEMENT - ReminderPro
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* ===== LAYOUT ===== */

.container{
    display:flex;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:260px;
    height:100vh;
    background:#0d6efd;
    position:fixed;
    left:0;
    top:0;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:12px;
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar ul li a:hover,
.sidebar ul li.active a{
    background:#fff;
    color:#0d6efd;
}

/* ===== CONTENU ===== */

.content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:30px;
}

/* ===== HEADER ===== */

header{
    margin-bottom:30px;
}

header h1{
    color:#0d6efd;
    font-size:32px;
}

header p{
    color:#666;
}

/* ===== BOX PRINCIPALE ===== */

.box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    max-width:700px;
}

/* TITRES */
.box h2{
    color:#333;
    margin-bottom:15px;
}

/* SELECT */
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:25px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,.2);
}

/* BOUTONS PARTAGE */

.share-buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.share-buttons button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    color:white;
}

/* WhatsApp */
.share-buttons button:nth-child(1){
    background:#25D366;
}

.share-buttons button:nth-child(1):hover{
    background:#1ebe5d;
}

/* Link */
.share-buttons button:nth-child(2){
    background:#0d6efd;
}

.share-buttons button:nth-child(2):hover{
    background:#084298;
}

/* Email */
.share-buttons button:nth-child(3){
    background:#6c757d;
}

.share-buttons button:nth-child(3):hover{
    background:#565e64;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.content{
    margin-left:0;
    width:100%;
}

.box{
    width:100%;
}

.share-buttons{
    flex-direction:column;
}

}
</style>

<h1>Partager un événement 📤</h1>
<p>Envoyez vos événements à vos amis facilement</p>

<div class="box">

<h2>Sélectionner un événement</h2>

<select id="eventSelect">
<option value="">Choisir un événement</option>
</select>

<h2>Partager via</h2>

<div class="share-buttons">

<button onclick="shareWhatsApp()">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</button>

<button onclick="copyLink()">
<i class="fa-solid fa-link"></i> Copier le lien
</button>

<script src="partager_evenement.js"></script>
<script>
  // ===============================
// PARTAGER EVENEMENT - ReminderPro
// ===============================

// Récupération des éléments
const select = document.getElementById("eventSelect");

// Charger les événements dans le select
function chargerEvenements() {

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    select.innerHTML = `<option value="">Choisir un événement</option>`;

    evenements.forEach((ev, index) => {

        let option = document.createElement("option");

        option.value = index;

        option.textContent = `${ev.titre} - ${ev.date}`;

        select.appendChild(option);

    });
}

// Appeler au chargement
chargerEvenements();


// Récupérer événement sélectionné
function getEvent() {

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    let index = select.value;

    if (index === "") {
        alert("Veuillez sélectionner un événement.");
        return null;
    }

    return evenements[index];
}


// ===============================
// PARTAGE WHATSAPP
// ===============================
function shareWhatsApp() {

    let ev = getEvent();
    if (!ev) return;

    let message =
`📅 Événement : ${ev.titre}
📆 Date : ${ev.date}
⏰ Heure : ${ev.heure}
📍 Lieu : ${ev.lieu || "Non défini"}

Envoyé depuis ReminderPro`;

    let url = `https://wa.me/?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}


// ===============================
// COPIER LE LIEN
// ===============================
function copyLink() {

    let ev = getEvent();
    if (!ev) return;

    let link = `ReminderPro - Événement : ${ev.titre} (${ev.date})`;

    navigator.clipboard.writeText(link);

    alert("Lien copié dans le presse-papiers !");
}


// ===============================
// PARTAGE EMAIL
// ===============================
function shareEmail() {

    let ev = getEvent();
    if (!ev) return;

    let subject = `Invitation : ${ev.titre}`;

    let body =
`Bonjour,

Vous êtes invité à un événement :

Titre : ${ev.titre}
Date : ${ev.date}
Heure : ${ev.heure}
Lieu : ${ev.lieu || "Non défini"}

Message envoyé depuis ReminderPro`;

    window.location.href =
`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
