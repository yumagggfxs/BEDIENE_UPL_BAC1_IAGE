<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion | ReminderPro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="connexion.css">
<style>
  /* ===========================
   CONNEXION - ReminderPro
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0d6efd,#4f46e5,#7c3aed);
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
    display:flex;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.left{
    width:45%;
    padding:60px 40px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:42px;
    margin-bottom:20px;
}

.left h2{
    font-size:30px;
    margin-bottom:15px;
}

.left p{
    font-size:17px;
    line-height:28px;
}

.right{
    width:55%;
    background:#fff;
    padding:50px;
}

.right h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:30px;
    font-size:30px;
}

.input-box{
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius:10px;
    padding:14px;
    margin-bottom:20px;
    transition:.3s;
}

.input-box:hover,
.input-box:focus-within{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.input-box i{
    color:#0d6efd;
    margin-right:10px;
    font-size:18px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#0d6efd;
    font-weight:bold;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#084298;
    transform:translateY(-2px);
}

.signup{
    text-align:center;
    margin-top:25px;
}

.signup a{
    color:#0d6efd;
    font-weight:bold;
    text-decoration:none;
}

.signup a:hover{
    text-decoration:underline;
}

@media(max-width:900px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left{
    text-align:center;
    padding:40px 30px;
}

.right{
    padding:35px 25px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="left">

<h1>ReminderPro</h1>

<h2>Bon retour !</h2>

<p>
Connectez-vous pour accéder à votre tableau de bord,
gérer vos événements et recevoir vos rappels automatiques.
</p>

</div>

<div class="right">

<form action="tableau_de_bord.html" method="POST">

<h2>Connexion</h2>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Adresse e-mail"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Mot de passe"
required>

</div>

<div class="options">

<label>

<input type="checkbox">

Se souvenir de moi

</label>

<a href="#">Mot de passe oublié ?</a>

</div>

<button type="submit">

<i class="fa-solid fa-right-to-bracket"></i>

Se connecter

</button>

<div class="signup">

Vous n'avez pas encore de compte ?

<a href="inscription.html">

S'inscrire

</a>

</div>

</form>

</div>

</div>

<script src="connexion.js"></script>
<script>
  // =============================
// CONNEXION - ReminderPro
// connexion.js
// =============================

const form = document.querySelector("form");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelector('input[type="password"]').value.trim();

    if(email === ""){
        alert("Veuillez saisir votre adresse e-mail.");
        return;
    }

    if(password === ""){
        alert("Veuillez saisir votre mot de passe.");
        return;
    }

    if(password.length < 6){
        alert("Le mot de passe doit contenir au moins 6 caractères.");
        return;
    }

    alert("Connexion réussie !");

    // Redirection vers le tableau de bord
    window.location.href = "tableau_de_bord.html";

});
</script>
</body>

</html>
