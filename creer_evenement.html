<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer un événement | ReminderPro</title>

<link rel="stylesheet" href="creer_evenement.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ===========================
   CREER EVENEMENT - ReminderPro
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* ===== LAYOUT ===== */

.container{
    display:flex;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:260px;
    height:100vh;
    background:#0d6efd;
    position:fixed;
    left:0;
    top:0;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:12px;
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar ul li a:hover,
.sidebar ul li.active a{
    background:#fff;
    color:#0d6efd;
}

/* ===== CONTENU ===== */

.content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:30px;
}

/* ===== HEADER ===== */

header{
    margin-bottom:30px;
}

header h1{
    color:#0d6efd;
    font-size:32px;
}

header p{
    color:#666;
}

/* ===== FORMULAIRE ===== */

form{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.row{
    display:flex;
    gap:20px;
}

.input-box{
    flex:1;
    display:flex;
    flex-direction:column;
    margin-bottom:20px;
}

label{
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input, select, textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,.2);
}

/* ===== BOUTON ===== */

button{
    width:100%;
    padding:15px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#084298;
    transform:translateY(-3px);
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.content{
    margin-left:0;
    width:100%;
}

.row{
    flex-direction:column;
}

}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>ReminderPro</h2>

<ul>

<li>
<a href="tableau_de_bord.html">
<i class="fa-solid fa-house"></i>
Tableau de bord
</a>
</li>

<li class="active">
<a href="#">
<i class="fa-solid fa-calendar-plus"></i>
Créer un événement
</a>
</li>

<li>
<a href="mes_evenements.html">
<i class="fa-solid fa-calendar-days"></i>
Mes événements
</a>
</li>

<li>
<a href="partager_evenement.html">
<i class="fa-solid fa-share-nodes"></i>
Partager un événement
</a>
</li>

<li>
<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>
</li>

<li>
<a href="profil.html">
<i class="fa-solid fa-user"></i>
Mon profil
</a>
</li>

<li>
<a href="index.html">
<i class="fa-solid fa-right-from-bracket"></i>
Déconnexion
</a>
</li>

</ul>

</div>

<div class="content">

<header>

<h1>Créer un nouvel événement</h1>

<p>Ajoutez un événement et recevez un rappel automatiquement.</p>

</header>

<form id="eventForm">

<div class="row">

<div class="input-box">

<label>Titre de l'événement</label>

<input
type="text"
id="titre"
placeholder="Ex : Réunion de travail"
required>

</div>

<div class="input-box">

<label>Catégorie</label>

<select id="categorie" required>

<option value="">Choisir</option>

<option>Anniversaire</option>

<option>Réunion</option>

<option>Mariage</option>

<option>Voyage</option>

<option>Examen</option>

<option>Rendez-vous</option>

<option>Autre</option>

</select>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Date</label>

<input
type="date"
id="date"
required>

</div>

<div class="input-box">

<label>Heure</label>

<input
type="time"
id="heure"
required>

</div>

</div>

<div class="input-box">

<label>Lieu</label>

<input
type="text"
id="lieu"
placeholder="Lieu de l'événement">

</div>

<div class="input-box">

<label>Description</label>

<textarea
id="description"
rows="5"
placeholder="Décrivez votre événement..."></textarea>

</div>

<div class="input-box">

<label>Rappel avant</label>

<select id="rappel">

<option>Le jour même</option>

<option>1 jour avant</option>

<option>2 jours avant</option>

<option>3 jours avant</option>

<option>1 semaine avant</option>

</select>

</div>

<button type="submit">

<i class="fa-solid fa-floppy-disk"></i>

Enregistrer l'événement

</button>

</form>

</div>

</div>

<script>
  // ======================================
// CREER EVENEMENT - ReminderPro (PRO FIX)
// ======================================

const form = document.getElementById("eventForm");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    // =========================
    // RÉCUPÉRATION
    // =========================
    const titre = document.getElementById("titre").value.trim();
    const categorie = document.getElementById("categorie").value;
    const date = document.getElementById("date").value;
    const heure = document.getElementById("heure").value;
    const lieu = document.getElementById("lieu").value.trim();
    const description = document.getElementById("description").value.trim();
    const rappel = document.getElementById("rappel").value;

    // =========================
    // VALIDATION
    // =========================
    if (!titre || !categorie || !date || !heure) {
        alert("⚠️ Veuillez remplir tous les champs obligatoires.");
        return;
    }

    // =========================
    // 🔥 FORMAT UNIQUE FIABLE (IMPORTANT)
    // =========================
    const datetime = new Date(date + "T" + heure).getTime();

    // =========================
    // OBJET EVENEMENT
    // =========================
    const evenement = {
        id: Date.now(),
        titre,
        categorie,
        date,
        heure,
        lieu,
        description,
        rappel,
        datetime,   // 👈 IMPORTANT pour notifications
        notified: false
    };

    // =========================
    // SAUVEGARDE
    // =========================
    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    evenements.push(evenement);

    localStorage.setItem("evenements", JSON.stringify(evenements));

    // =========================
    // CONFIRMATION
    // =========================
    alert("✅ Événement enregistré avec succès !");

    window.location.href = "tableau_de_bord.html";
});
</script>
</body>

</html>
