<script>
  // ===============================
// NOTIFICATIONS - ReminderPro
// ===============================

const container = document.getElementById("notificationsList");

// Charger les notifications
function chargerNotifications() {

    container.innerHTML = "";

    let evenements = JSON.parse(localStorage.getItem("evenements")) || [];

    if (evenements.length === 0) {
        container.innerHTML = "<p style='color:#666'>Aucune notification pour le moment.</p>";
        return;
    }

    const aujourdHui = new Date().toISOString().split("T")[0];

    evenements.forEach(ev => {

        let card = document.createElement("div");
        card.classList.add("notification-card");

        let message = "";
        let type = "success";

        // Événement aujourd’hui
        if (ev.date === aujourdHui) {
            message = `🔴 Aujourd'hui : ${ev.titre} à ${ev.heure}`;
            type = "danger";
        }

        // Événement futur proche (simple logique)
        else {
            let dateEvent = new Date(ev.date);
            let today = new Date();

            let diff = Math.ceil((dateEvent - today) / (1000 * 60 * 60 * 24));

            if (diff === 1) {
                message = `🟡 Demain : ${ev.titre} à ${ev.heure}`;
                type = "warning";
            }

            else if (diff > 1 && diff <= 3) {
                message = `🔵 Bientôt : ${ev.titre} le ${ev.date}`;
                type = "success";
            }

            else {
                message = `📅 ${ev.titre} prévu le ${ev.date}`;
                type = "success";
            }
        }

        card.classList.add(type);

        card.innerHTML = `
            <h3><i class="fa-solid fa-bell"></i> Notification</h3>
            <p>${message}</p>
        `;

        container.appendChild(card);
    });

    // Ajouter notification anniversaire
    verifierAnniversaire();
}


// Vérification anniversaire
function verifierAnniversaire() {

    let naissance = localStorage.getItem("naissance");

    if (!naissance) return;

    const today = new Date();
    const dateNaissance = new Date(naissance);

    if (
        today.getDate() === dateNaissance.getDate() &&
        today.getMonth() === dateNaissance.getMonth()
    ) {

        let card = document.createElement("div");
        card.classList.add("notification-card", "danger");

        card.innerHTML = `
            <h3>🎉 Joyeux anniversaire !</h3>
            <p>Aujourd'hui est votre anniversaire. Toute l'équipe ReminderPro vous souhaite une excellente journée 🎂</p>
        `;

        container.prepend(card);
    }
}


// Charger au démarrage
chargerNotifications();
</script>
