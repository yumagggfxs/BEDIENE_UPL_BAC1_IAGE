<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mon profil | ReminderPro</title>

<link rel="stylesheet" href="profil.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ===========================
   PROFIL - ReminderPro
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* ===== LAYOUT ===== */

.container{
    display:flex;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:260px;
    height:100vh;
    background:#0d6efd;
    position:fixed;
    left:0;
    top:0;
    color:#fff;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:10px 0;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:12px;
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    transition:0.3s;
}

.sidebar ul li a:hover,
.sidebar ul li.active a{
    background:#fff;
    color:#0d6efd;
}

/* ===== CONTENU ===== */

.content{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:30px;
}

/* ===== HEADER ===== */

header{
    margin-bottom:30px;
}

header h1{
    color:#0d6efd;
    font-size:32px;
}

header p{
    color:#666;
}

/* ===== CARTE PROFIL ===== */

.profile-card{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* avatar */
.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px auto;
    color:white;
    font-size:40px;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
    color:#333;
}

input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
    font-size:15px;
}

input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,.2);
}

/* BUTTON */

button{
    margin-top:10px;
    padding:15px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#084298;
    transform:translateY(-3px);
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.content{
    margin-left:0;
    width:100%;
}

.profile-card{
    width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>ReminderPro</h2>

<ul>

<li>
<a href="tableau_de_bord.html">
<i class="fa-solid fa-house"></i>
Tableau de bord
</a>
</li>

<li>
<a href="creer_evenement.html">
<i class="fa-solid fa-calendar-plus"></i>
Créer un événement
</a>
</li>

<li>
<a href="mes_evenements.html">
<i class="fa-solid fa-calendar-days"></i>
Mes événements
</a>
</li>

<li>
<a href="partager_evenement.html">
<i class="fa-solid fa-share-nodes"></i>
Partager</a>
</li>

<li>
<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>
</li>

<li class="active">
<a href="#">
<i class="fa-solid fa-user"></i>
Mon profil
</a>
</li>

<li>
<a href="index.html">
<i class="fa-solid fa-right-to-bracket"></i>
Déconnexion
</a>
</li>

</ul>

</div>

<!-- CONTENU -->
<div class="content">

<header>
<h1>👤 Mon profil</h1>
<p>Gérez vos informations personnelles</p>
</header>

<div class="profile-card">

<div class="avatar">
<i class="fa-solid fa-user"></i>
</div>

<form id="profileForm">

<div class="input-box">
<label>Nom</label>
<input type="text" id="nom">
</div>

<div class="input-box">
<label>Postnom</label>
<input type="text" id="postnom">
</div>

<div class="input-box">
<label>Prénom</label>
<input type="text" id="prenom">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-box">
<label>Téléphone</label>
<input type="tel" id="telephone">
</div>

<div class="input-box">
<label>Date de naissance</label>
<input type="date" id="naissance">
</div>

<button type="submit">
<i class="fa-solid fa-floppy-disk"></i>
Enregistrer
</button>

</form>

</div>

</div>

</div>

<script>
  // ===============================
// PROFIL - ReminderPro
// ===============================

// Sélection du formulaire
const form = document.getElementById("profileForm");

// Champs
const nom = document.getElementById("nom");
const postnom = document.getElementById("postnom");
const prenom = document.getElementById("prenom");
const email = document.getElementById("email");
const telephone = document.getElementById("telephone");
const naissance = document.getElementById("naissance");


// ===============================
// CHARGER LES DONNÉES
// ===============================
function chargerProfil() {

    nom.value = localStorage.getItem("nom") || "";
    postnom.value = localStorage.getItem("postnom") || "";
    prenom.value = localStorage.getItem("prenom") || "";
    email.value = localStorage.getItem("email") || "";
    telephone.value = localStorage.getItem("telephone") || "";
    naissance.value = localStorage.getItem("naissance") || "";
}


// ===============================
// SAUVEGARDER LES DONNÉES
// ===============================
form.addEventListener("submit", function(e){
    e.preventDefault();

    localStorage.setItem("nom", nom.value);
    localStorage.setItem("postnom", postnom.value);
    localStorage.setItem("prenom", prenom.value);
    localStorage.setItem("email", email.value);
    localStorage.setItem("telephone", telephone.value);
    localStorage.setItem("naissance", naissance.value);

    alert("Profil mis à jour avec succès !");

    // Retour tableau de bord
    window.location.href = "tableau_de_bord.html";
});


// ===============================
// INITIALISATION
// ===============================
chargerProfil();
</script>
</body>

</html>
